<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Jogos de Xadrez</title>
    <link rel="icon" type="image/png" href="assets/images/kabure-iwa.png">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" id="tema-css" href="css/themes/floresta.css">
</head>
<body class="bg-dark text-light">
    <button id="btn-sidebar" class="btn-sidebar-abrir">⚙️ Menu</button>

    <aside id="sidebar-config" class="sidebar">
        <div class="sidebar-header">
            <h3>⚙️ Painel de Controle</h3>
            <button id="btn-sidebar-fechar" class="btn-sidebar-fechar">&times;</button>
        </div>
        
        <div class="sidebar-conteudo">
            
            <div class="config-grupo">
                <label for="seletor-jogo">Selecione o Modo:</label>
                <select id="seletor-jogo" class="form-select">
                    <option value="ogre-sumo" selected>Batalha dos Reis</option>
                </select>
            </div>

            <div class="config-grupo">
                <label for="slider-volume">Volume dos Sons</label>
                <input type="range" id="slider-volume" min="0" max="1" step="0.1" value="0.8">
            </div>

            <hr class="sidebar-divisor">

            <div class="sidebar-tutorial">
                <h4 id="tutorial-titulo-objetivo">Objetivo</h4>
                <p id="tutorial-texto-objetivo"></p>

                <h4 id="tutorial-titulo-extra">Explicação Extra</h4>
                <p id="tutorial-texto-extra"></p>
            </div>
        </div>
    </aside>

    <main class="container-jogo py-4">
        <header class="text-center mb-2">
            <h1 id="titulo-jogo-ativo" class="display-5 fw-bold text-warning" style="margin-top: 20px;">Batalha dos Reis</h1>
        </header>
        
        <div class="text-center">
            <div id="status-turno" class="fs-5 fw-bold mb-3 text-success d-inline-block px-4 py-2" style="background: rgba(0,0,0,0.3); border-radius: 50px; border: 1px solid #454d55;">
                Sua vez
            </div>
        </div>

        <div id="wrapper-tabuleiro" class="shadow mx-auto">
            <div id="tabuleiro-container"></div>
        </div>

        <div class="text-center mt-4">
            <button id="btn-reiniciar" class="btn btn-success btn-lg px-5 shadow">Reiniciar Partida</button>
        </div>
    </main>

    <script type="module" src="dist/app.js"></script>
</body>
</html>
